name: Test & Validate

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgconf-2-4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0 \
            libgtk-3-0 \
            libxss1 \
            libnss3 \
            libappindicator1 \
            libindicator7 \
            libgbm1 \
            libxkbcommon0 \
            libpango-1.0-0 \
            libpangoft2-1.0-0
      
      - name: Install dependencies
        run: npm install
      
      - name: Run unit tests
        run: npm test
      
      - name: Build
        run: npm run build
      
      - name: Run accessibility tests
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'
          PUPPETEER_EXECUTABLE_PATH: '/usr/bin/chromium-browser'
        run: npm run test:a11y