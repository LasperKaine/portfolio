name: Test & Validate

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run unit tests
        run: npm test
      
      - name: Build
        run: npm run build
      
      - name: Run accessibility tests
        env:
          PA11Y_LAUNCH_CONFIG: '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'
        run: npm run test:a11y

